candidate_use_cases:
  - id: "USJ_TICKET_BACKUP"
    category: "USJ"
    item: "Studio Pass / Express Pass / VIP related products"
    recommendation: "官方 USJ 為主；KKday/Klook 僅作價格、信用卡優惠、庫存備援比較。"
    purchase_timing: "2027 官方票券與 Express Pass 開賣後立即比較；2027-11 目前 PENDING_OFFICIAL_ANNOUNCEMENT。"
    decision_status: "candidate"
    project_fit: "high"
