    category: "Sightseeing pass"
    item: "Osaka Amazing Pass"
    recommendation: "只在同一天安排 2-3 個以上免費入場設施與大阪市內移動時才考慮；目前不納入正式行程。"
    current_reference:
      one_day: "JPY 3,500"
      two_day: "JPY 5,000"
      source_status: "2026 reference; 2027 PENDING_OFFICIAL_ANNOUNCEMENT"
    decision_status: "candidate"
    project_fit: "medium-low for Luxury Slow Travel"
  - id: "OSAKA_E_PASS"
    category: "Sightseeing pass"
    item: "Osaka e-Pass"
    recommendation: "僅作景點 QR 入場候補；注意它不是 Osaka Amazing Pass，交通覆蓋不同。"
    purchase_timing: "正式景點日確認後再比價。"
    decision_status: "candidate"
    project_fit: "medium-low"

comparison_rules:
  price_check:
    - "同商品比較官方、KKday、Klook 三方總價。"
    - "比較幣別、刷卡回饋、平台折扣碼、點數回饋與退款成本。"
  voucher_check:
    - "確認是否即時出票。"
    - "確認是否需要現場換票。"
    - "確認 QR code 是否可直接使用。"
    - "確認旅客姓名、行李限制與旅客資格限制。"
  cancellation_check:
    - "不可退改商品不提前購買，除非票券高度稀缺。"
    - "USJ Express Pass、KKday 機場接送與餐廳相關商品需逐筆檢查。"
  itinerary_check:
    - "不得因為平台套票便宜而壓縮 Luxury Slow Travel 節奏。"
    - "未經使用者確認，不得把候補票券納入正式每日行程。"

