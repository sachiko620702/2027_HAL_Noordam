customer_output_standard:
  required_sections:
    - "旅遊行程總覽"
    - "行程表"
    - "行前提醒／TODO LIST"
    - "預算表"
    - "費用統計"
    - "待確認事項"
    - "補充說明"
  required_tables:
    itinerary_table:
      columns: ["日期", "行程重點", "主要地點", "交通安排", "餐食安排", "備註"]
    todo_table:
      columns: ["項目", "建議完成時間", "狀態", "提醒說明"]
      allowed_status: ["已完成", "進行中", "待確認", "尚未處理", "已取消"]
    budget_table:
      columns: ["分類", "內容說明", "預估費用", "已付款", "備註"]
      categories: ["交通", "住宿", "購物", "飲食", "USJ", "其他"]
  style_rules:
    - "顧客版，不使用內部專案管理語氣。"
    - "表格簡潔，不新增複雜欄位。"
    - "不確定金額標註待確認或暫估，不寫成確定價格。"
    - "未確認候補項目不得直接排入正式行程。"
    - "後續更新同一份資料，不建立平行版本。"

itinerary_table:
