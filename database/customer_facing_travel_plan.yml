  - date: "Day 2｜2027/11/18（四）"
    focus: "USJ 一日遊"
    main_places: "Universal Studios Japan"
    transportation: "KKday #536220 飯店 ↔ USJ 來回接送"
    meals: "園區內用餐待確認"
    notes: "USJ 門票、Express Pass、入園規則與活動待官方公布。"
  - date: "Day 3｜2027/11/19（五）"
    focus: "候補：木津市場早午餐＋京都寶可夢／漫畫／打卡 10 小時包車"
    main_places: "木津市場、Pokémon Center KYOTO、京都國際漫畫博物館、東山／祇園、心齋橋或道頓堀"
    transportation: "候補使用 KKday #133661 10 小時包車；不硬套平台範例路線"
    meals: "木津市場早午餐；下午咖啡／甜點；晚餐待確認"
    notes: "候補行程，主打美食、拍照、寶可夢與動漫；若太累可省略伏見稻荷或清水寺內部。"
  - date: "Day 4｜2027/11/20（六）"
    focus: "精品購物與自由活動"
    main_places: "梅田百貨、心齋橋精品區（待確認）"
    transportation: "地鐵／步行／計程車"
    meals: "午餐、晚餐待確認"
    notes: "適合安排百貨、精品、藥妝與伴手禮；可依體力保留自由活動。"
  - date: "Day 5｜2027/11/21（日）"
    focus: "退房、返回台灣"
    main_places: "InterContinental Osaka、關西機場"
    transportation: "KKday #129909 飯店接送至 KIX；EVA Air BR129"
    meals: "早餐／機場用餐待確認"
    notes: "建議出發前再次確認回程航班、接送時間與行李。"

todo_table:
