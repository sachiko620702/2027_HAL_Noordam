trip_overview:
  destination: "大阪"
  dates: "2027/11/17（三）～2027/11/21（日）"
  duration: "五天四夜"
  travelers: 2
  hotel: "InterContinental Osaka"
  style: "Luxury Slow Travel"
  flight_baseline: "去程 EVA Air BR178 暫採現行班表 06:30 TPE → 10:10 KIX；回程 EVA Air BR129 暫採現行班表 18:30 KIX → 20:30 TPE。2027/11 官方班表、票價與訂位狀態仍需確認。"
  confirmed_scope:
    - "USJ 一天"
    - "好吃優先餐飲"
    - "精品購物"
    - "Day 1 正式確認：抵達後使用行政酒廊下午茶，休息一下，再去梅田 Pokémon Center OSAKA，並在附近吃晚餐後回飯店"
    - "Day 1 晚餐候補已建立：Kiji、Chibo、Negiyaki Yamamoto、Grill Ron、Kushikatsu Daruma、Hanadako、Tsurutontan TOP CHEFS；尚未選定正式餐廳"
    - "Day 3 正式確認：木津市場＋京都甜點伴手禮＋寶可夢／動漫＋京 鰻和 本店午餐＋天ぷら 京星晚餐"
    - "天ぷら 京星主預約方式：TABLEALL Reservation Request"
    - "Day 4 正式確認：活動範圍以心齋橋為主；Pokémon Center OSAKA DX；午餐後回 InterContinental Osaka；下午在飯店附近活動；晚餐在飯店內餐廳使用"
    - "Day 4 飯店內晚餐候選：PIERRE 或 NOKA Roast & Grill；ADEE 僅作飯後飲料／Nightcap 候選"
    - "Day 3 交通主方案：電車＋短程計程車；KKday #133661 包車僅作備案"
    - "航班時間規劃基準：BR178 06:30–10:10；BR129 18:30–20:30"

itinerary_table:
  - date: "Day 1｜2027/11/17（三）"
    focus: "抵達大阪、行政酒廊下午茶、飯店休息、梅田 Pokémon Center、附近晚餐"
    main_places: "台北桃園機場、關西機場、InterContinental Osaka、梅田、Pokémon Center OSAKA"
    transportation: "EVA Air BR178 06:30–10:10；KKday #129909 機場接送至飯店；梅田步行／計程車"
    meals: "行政酒廊下午茶；Pokémon Center OSAKA 附近晚餐候補已建立但未正式決定"
    notes: "晚餐候補已建立，但仍需確認評分、營業、預約、價格與排隊狀況。"
  - date: "Day 2｜2027/11/18（四）"
    focus: "USJ 一日遊"
    main_places: "Universal Studios Japan"
    transportation: "KKday #536220 飯店 ↔ USJ 來回接送"
    meals: "行政酒廊早餐；園區內用餐待確認"
    notes: "USJ 門票與活動待官方公布。"
  - date: "Day 3｜2027/11/19（五）"
    focus: "木津市場、京都午餐、甜點伴手禮、寶可夢／動漫、京都晚餐"
    main_places: "木津市場、京 鰻和 本店、鶴屋吉信 IRODORI、末富、Pokémon Center KYOTO、京都國際漫畫博物館、MALEBRANCHE 加加阿365祇園店、祇園、天ぷら 京星"
    transportation: "木津市場後前往京都站：地鐵＋JR，或短程計程車到大阪站再搭 JR；京都市內用地鐵＋短程計程車；KKday #133661 僅作備案"
    meals: "木津市場早段輕食／早午餐；午餐：京 鰻和 本店；京都甜點伴手禮；晚餐：天ぷら 京星"
    notes: "正式行程已確認。Day 3 不吃飯店行政酒廊早餐；天ぷら 京星主預約方式為 TABLEALL Reservation Request。"
  - date: "Day 4｜2027/11/20（六）"
    focus: "心齋橋 Pokémon Center、精品購物、午餐後回飯店、行政酒廊下午茶、飯店內晚餐"
    main_places: "心齋橋、大丸心齋橋、Pokémon Center OSAKA DX、InterContinental Osaka Executive Lounge、Grand Front Osaka、飯店內餐廳"
    transportation: "上午到心齋橋；午餐後回 InterContinental Osaka；下午只在飯店或飯店附近活動"
    meals: "行政酒廊早餐；心齋橋周邊午餐待確認；行政酒廊下午茶；飯店內餐廳晚餐候選：PIERRE 或 NOKA Roast & Grill"
    notes: "正式安排活動範圍以心齋橋為主；午餐後回 InterContinental Osaka，不再安排遠距離景點；晚餐固定在飯店內餐廳使用，實際餐廳、訂位、菜單與價格待確認。"
  - date: "Day 5｜2027/11/21（日）"
    focus: "退房、返回台灣"
    main_places: "InterContinental Osaka、關西機場、台北桃園機場"
    transportation: "KKday #129909 飯店接送至 KIX；EVA Air BR129 18:30–20:30"
    meals: "行政酒廊早餐或機場用餐待確認"
    notes: "BR129 先採現行班表暫排；回程為晚班機，可保留上午整理與最後採買時間。2027 官方航班與接送時間仍需確認。"

