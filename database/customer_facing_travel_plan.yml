    suggested_time: "確認路線後"
    status: "進行中"
    reminder: "目前方向為輕鬆、美食、打卡、寶可夢與動漫；需確認是否正式採用 KKday #133661。"
  - item: "機票"
    suggested_time: "2027 官方班表開放後"
    status: "待確認"
    reminder: "已選去程 BR178、回程 BR129；仍需確認 2027/11 班表、票價、行李與付款狀態。"
  - item: "住宿"
    suggested_time: "出發前 1～3 個月再次確認"
    status: "進行中"
    reminder: "住宿方向為 InterContinental Osaka；需再次確認訂房、房型、早餐、Lounge 與住宿稅。"
  - item: "USJ 票券"
    suggested_time: "2027/11 票券開賣後盡早處理"
    status: "待確認"
    reminder: "Studio Pass、Express Pass、VIP、整理券與活動皆待官方公布。"
  - item: "交通安排"
    suggested_time: "出發前 1～2 個月"
    status: "進行中"
    reminder: "機場接送使用 KKday #129909；飯店 USJ 來回使用 KKday #536220；Day 3 候補包車使用 KKday #133661。"
  - item: "餐廳預約"
    suggested_time: "依餐廳規則提前 1～3 個月"
    status: "待確認"
    reminder: "餐飲方向為好吃優先；候選餐廳需確認營業日、預約窗口與取消政策。"
  - item: "旅遊保險"
    suggested_time: "出發前 1 個月"
    status: "待確認"
    reminder: "已記錄金額 TWD 6,900；付款狀態、保障內容與緊急聯絡方式需確認。"
  - item: "網路／漫遊"
    suggested_time: "出發前 2～4 週"
    status: "進行中"
    reminder: "已記錄手機漫遊兩人總額 TWD 499；需確認開通方式、熱點分享與計費規則。"
  - item: "換匯"
    suggested_time: "出發前分批準備"
    status: "尚未處理"
    reminder: "日幣現金與信用卡使用比例待確認；匯率需持續追蹤。"
  - item: "護照與證件"
    suggested_time: "出發前 3～6 個月"
    status: "尚未處理"
    reminder: "請確認護照效期、訂房姓名、機票姓名與信用卡資訊一致。"
  - item: "行李準備"
    suggested_time: "出發前 1～2 週"
    status: "尚未處理"
    reminder: "11 月大阪天氣需出發前再確認；建議準備好走鞋、外套、藥品與購物行李空間。"

