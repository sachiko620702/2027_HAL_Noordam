metadata:
  id: day4_shinsaibashi_hotel_dinner
  title: "Day 4 心齋橋為主＋午餐後回飯店＋PIERRE Anniversary Dinner"
  version: "V5.23.0"
  status: "active_formal_day4_planning_baseline_with_pierre_anniversary_dinner"
  last_updated: "2026-07-06"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

user_confirmed_input:
  date_received: "2026-07-06"
  previous_dinner_intent_v5_22: "晚餐想要吃壽司。"
  new_dinner_intent_v5_23: "Anniversary Dinner Pierre 的靠窗座位，盡享大阪夜景美景。"
  interpretation:
    - "Day 4 上午與午餐前後仍以心齋橋／大丸心齋橋／Pokémon Center OSAKA DX 周邊為主。"
    - "午餐後仍維持回 InterContinental Osaka，下午只在飯店或飯店附近活動。"
    - "Day 4 晚餐正式方向改為 InterContinental Osaka 館內 PIERRE Anniversary Dinner。"
    - "預約備註需請求靠窗座位／大阪夜景座位，但座位安排不可視為保證，需由餐廳確認。"
    - "V5.22.0 壽司晚餐偏好降為備案，不再作為 Day 4 主晚餐方向。"

conflict_resolution:
  issue: "壽司晚餐 vs PIERRE Anniversary Dinner"
  decision: "PIERRE Anniversary Dinner 優先。"
  reason: "使用者明確指定 Anniversary Dinner Pierre 的靠窗座位與大阪夜景。"
  impact: "Day 4 晚餐不再需要優先搜尋壽司候選；壽司僅保留為使用者再次改回壽司時的備案。"
  status: "RESOLVED_BY_USER_CONFIRMATION"

formal_day4_route:
  date: "2027/11/20（六）"
  theme: "心齋橋 Pokémon Center OSAKA DX＋精品購物＋午餐後回飯店＋行政酒廊下午茶＋PIERRE Anniversary Dinner"
  planning_principle: "Luxury Slow Travel；上午集中在心齋橋，午餐後回飯店降低移動負擔；晚餐在館內 PIERRE 做紀念日晚餐。"
  items:
    - time: "08:30–09:30"
      plan: "InterContinental Osaka 行政酒廊早餐"
      status: "pending_hotel_2027_policy"
      note: "早餐與 lounge access 需確認。"
    - time: "10:00–12:00"
      plan: "心齋橋｜Pokémon Center OSAKA DX／大丸心齋橋周邊"
      status: "fixed_area_pending_2027_hours"
      note: "官方目前標示 Pokémon Center OSAKA DX 位於大丸心齋橋本館 9F，10:00–20:00；2027/11/20 營業時間、活動、限定商品與入場規則仍需再次確認。"
    - time: "12:00–13:15"
      plan: "心齋橋周邊午餐"
      status: "candidate_needed"
      note: "午餐仍待補候選；原則上選心齋橋／大丸心齋橋／難波北側，避免午餐後還要長距離移動。"
    - time: "13:15–14:00"
      plan: "心齋橋 → InterContinental Osaka"
      status: "fixed_direction"
      note: "午餐後回飯店。可搭 Osaka Metro 御堂筋線心齋橋站至梅田站，再步行／短程計程車到飯店；若購物多或疲勞，直接計程車。"
    - time: "14:00–15:00"
      plan: "飯店休息／整理購物品"
      status: "fixed_preference"
      note: "避免把 Day 4 排成整天外出；符合 Luxury Slow Travel。"
    - time: "15:00–16:30"
      plan: "InterContinental Osaka Executive Lounge 下午茶"
      status: "fixed_pending_hotel_2027_policy"
      note: "已正式排入 Day 4；實際時段、資格與內容待飯店 2027 政策確認。"
    - time: "16:30–18:30"
      plan: "飯店附近活動／梅田 Grand Front Osaka 周邊輕鬆散步"
      status: "fixed_area"
      note: "活動範圍限制在飯店附近，不再回心齋橋或安排遠距離景點。"
    - time: "19:00–20:30"
      plan: "Anniversary Dinner：PIERRE"
      status: "formal_dinner_direction_pending_2027_reservation"
      note: "預約時需註明 anniversary dinner，並請求靠窗座位／大阪夜景座位；座位安排需由餐廳確認，不保證。"
    - time: "20:30 後"
      plan: "回飯店整理戰利品與行李／休息"
      status: "planning_baseline"
      note: "隔天退房返台。"

anniversary_dinner:
  date: "2027/11/20（六）"
  restaurant_japanese: "フレンチレストラン ピエール"
  restaurant_english: "PIERRE"
  location: "InterContinental Osaka"
  role: "Day 4 formal anniversary dinner"
  priority: "PRIMARY_FORMAL_DINNER"
  requested_seat: "Window seat / night-view seat"
  requested_experience: "Anniversary Dinner with Osaka night view"
  reservation_note:
    - "預約時需明確備註：Anniversary Dinner。"
    - "請求靠窗座位／大阪夜景座位。"
    - "靠窗座位與夜景座位需由餐廳安排，不可視為保證。"
    - "可同步詢問是否能安排紀念日小驚喜、甜點訊息或拍照協助。"
  reservation_status: "PENDING_2027_BOOKING_WINDOW"
  menu_status: "PENDING_2027_MENU"
  price_status: "NEEDS_RECONFIRMATION"
  cancellation_policy_status: "NEEDS_RECONFIRMATION"

reservation_message_draft:
  english: >-
    This is an anniversary dinner. If possible, we would be very grateful to have a window table or a table with a beautiful Osaka night view. We understand that seating cannot be guaranteed, but we would truly appreciate it if you could note our request. If there is any anniversary dessert message or small celebration option available, we would also be happy to know.

fallbacks:
  sushi:
    role: "備案"
    status: "FALLBACK_ONLY"
    note: "V5.22.0 曾記錄壽司晚餐偏好；V5.23.0 已由使用者改為 PIERRE Anniversary Dinner。除非使用者再次改回壽司，否則不作主方案。"
  noka:
    restaurant_japanese: "ノカ ロースト & グリル"
    restaurant_english: "NOKA Roast & Grill"
    role: "館內非 PIERRE 備案"
    status: "FALLBACK_ONLY"
    note: "若 PIERRE 無法預約或座位／菜單不符合需求，可再比較 NOKA，但不作目前主方案。"
  adee:
    restaurant_japanese: "アディ ラウンジ＆バー"
    restaurant_english: "ADEE Lounge & Bar"
    role: "飯後飲料／Nightcap 候選，不作主晚餐"
    status: "OPTIONAL_NIGHTCAP_ONLY"
    note: "如 PIERRE 晚餐後仍想喝飲料，可作飯後選項。"

watch_items:
  - "Pokémon Center OSAKA DX 2027/11/20 business hours, entry restrictions, event / campaign, limited goods."
  - "心齋橋午餐候選：需補好吃優先、回飯店動線順的餐廳。"
  - "Day 4 午餐後回飯店交通：御堂筋線 vs taxi, depending on purchases and fatigue."
  - "InterContinental Osaka Executive Lounge 2027 Day 4 afternoon tea hours and eligibility."
  - "PIERRE 2027/11/20 dinner booking window, menu, price, service charge, dress code, cancellation policy, and table request rules."
  - "PIERRE anniversary dinner request: window seat / Osaka night view, anniversary dessert message, small celebration option, and photo assistance."
  - "Sushi is retained only as fallback if the user changes back."

