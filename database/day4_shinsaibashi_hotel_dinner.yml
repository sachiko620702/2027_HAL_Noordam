metadata:
  id: day4_shinsaibashi_hotel_dinner
  title: "Day 4 心齋橋為主＋午餐後回飯店＋壽司晚餐偏好"
  version: "V5.22.0"
  status: "active_formal_day4_planning_baseline_with_sushi_dinner_preference"
  last_updated: "2026-07-06"
  maintained_by: "ChatGPT"
  language: "zh-Hant"

user_confirmed_input:
  date_received: "2026-07-06"
  previous_day4_intent: "2027/11/20 活動範圍以心齋橋為主；午餐之後回飯店，在飯店附近活動；晚餐想在飯店內的餐廳使用。"
  new_dinner_intent: "晚餐想要吃壽司。"
  interpretation:
    - "Day 4 上午與午餐前後仍以心齋橋／大丸心齋橋／Pokémon Center OSAKA DX 周邊為主。"
    - "午餐後仍維持回 InterContinental Osaka，下午只在飯店或飯店附近活動。"
    - "Day 4 晚餐餐飲偏好改為壽司優先。"
    - "因 InterContinental Osaka 官方 FAQ 目前寫明館內沒有和食餐廳，壽司晚餐很可能需要改為飯店附近／梅田／大阪站周邊壽司候選。"
    - "若使用者仍堅持晚餐必須在飯店內，則 PIERRE / NOKA Roast & Grill 可作非壽司備案，但不符合新壽司偏好。"

conflict_note:
  issue: "飯店內晚餐 vs 壽司晚餐"
  current_official_reference: "InterContinental Osaka 官方 FAQ 目前列出館內餐廳包含 PIERRE、NOKA Roast & Grill、ADEE、3-60、STRESSED，並明確回答館內沒有和食餐廳。"
  implication: "壽司晚餐若作為優先目標，需改找飯店附近或梅田／大阪站周邊壽司餐廳。"
  status: "NEEDS_USER_FINAL_CONFIRMATION_FOR_LOCATION"

formal_day4_route:
  date: "2027/11/20（六）"
  theme: "心齋橋 Pokémon Center OSAKA DX＋精品購物＋午餐後回飯店＋行政酒廊下午茶＋壽司晚餐"
  planning_principle: "Luxury Slow Travel；上午集中在心齋橋，午餐後回飯店降低移動負擔；晚餐改以壽司為優先。"
  items:
    - time: "08:30–09:30"
      plan: "InterContinental Osaka 行政酒廊早餐"
      status: "pending_hotel_2027_policy"
      note: "早餐與 lounge access 需確認。"
    - time: "10:00–12:00"
      plan: "心齋橋｜Pokémon Center OSAKA DX／大丸心齋橋周邊"
      status: "fixed_area_pending_2027_hours"
      note: "官方目前標示 Pokémon Center OSAKA DX 位於大丸心齋橋本館 9F，10:00–20:00；2027/11/20 營業時間、活動、限定商品與入場規則仍需再次確認。"
    - time: "12:00–13:15"
      plan: "心齋橋周邊午餐"
      status: "candidate_needed"
      note: "午餐仍待補候選；原則上選心齋橋／大丸心齋橋／難波北側，避免午餐後還要長距離移動。"
    - time: "13:15–14:00"
      plan: "心齋橋 → InterContinental Osaka"
      status: "fixed_direction"
      note: "午餐後回飯店。可搭 Osaka Metro 御堂筋線心齋橋站至梅田站，再步行／短程計程車到飯店；若購物多或疲勞，直接計程車。"
    - time: "14:00–15:00"
      plan: "飯店休息／整理購物品"
      status: "fixed_preference"
      note: "避免把 Day 4 排成整天外出；符合 Luxury Slow Travel。"
    - time: "15:00–16:30"
      plan: "InterContinental Osaka Executive Lounge 下午茶"
      status: "fixed_pending_hotel_2027_policy"
      note: "已正式排入 Day 4；實際時段、資格與內容待飯店 2027 政策確認。"
    - time: "16:30–18:30"
      plan: "飯店附近活動／梅田 Grand Front Osaka 周邊輕鬆散步"
      status: "fixed_area"
      note: "活動範圍限制在飯店附近，不再回心齋橋或安排遠距離景點。"
    - time: "19:00–20:30"
      plan: "壽司晚餐"
      status: "preferred_cuisine_location_candidate_needed"
      note: "使用者新增偏好：晚餐想吃壽司。因飯店內無和食餐廳，目前建議改找飯店附近／梅田／大阪站周邊壽司候選；若仍堅持飯店內，則只能保留 PIERRE / NOKA 作非壽司備案。"
    - time: "20:30 後"
      plan: "回飯店整理戰利品與行李／休息"
      status: "planning_baseline"
      note: "隔天退房返台。"

sushi_dinner_strategy:
  priority: "SUSHI_FIRST"
  preferred_area_order:
    - "InterContinental Osaka 附近／Grand Front Osaka／梅田北側"
    - "大阪站／梅田周邊"
    - "心齋橋高品質壽司，僅在使用者願意晚餐再外出時考慮"
  selection_principles:
    - "好吃優先，不以米其林作主要標籤。"
    - "符合 Luxury Slow Travel，避免 Day 4 晚上再安排遠距離移動。"
    - "可預約優先，避免最後一晚排隊過久。"
    - "需確認 2027/11/20 營業、訂位、價格、取消政策與座位舒適度。"
  candidate_status: "CANDIDATE_NEEDED"

