selection_logic:
  priority_rules:
    - "距離 Pokémon Center OSAKA / JR 大阪站 / 梅田地下街近，避免抵達日過度移動。"
    - "適合下午茶後晚餐，不宜太重或排隊風險過高。"
    - "優先大阪代表性餐點：大阪燒、蔥燒、章魚燒、串炸。"
    - "保留一到兩個舒適型選項，避免抵達日只剩排隊小店。"
    - "未確認分數不得寫死，先標示【需再次確認】。"

